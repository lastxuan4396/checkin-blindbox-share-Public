<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>签到 + 盲盒后台 v5.0</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #f8fafc;
      --card: #fff;
      --line: #dbe3ee;
      --text: #0f172a;
      --muted: #64748b;
      --ok: #16a34a;
      --pending: #d97706;
      --brand: #0f766e;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      padding: 16px;
    }
    .wrap { max-width: 1160px; margin: 0 auto; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    h2, h3 { margin: 0 0 8px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .stat b { display: block; margin-top: 4px; color: var(--text); font-size: 24px; }
    .small { font-size: 13px; color: var(--muted); }
    .ok { color: var(--ok); font-weight: 600; }
    .pending { color: var(--pending); font-weight: 600; }
    .danger { color: var(--danger); font-weight: 600; }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 1000px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 10px 6px;
      font-size: 14px;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    .link { color: #0369a1; text-decoration: none; }
    .thumb {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-muted { background: #334155; }
    .btn-danger { background: #b91c1c; }
    .btn-outline {
      background: #fff;
      color: #334155;
      border: 1px solid var(--line);
    }
    .map-wrap {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }
    .map-canvas {
      height: 320px;
      width: 100%;
      background: #e2e8f0;
    }
    .fallback-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }
    .fallback-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }
    .fallback-item iframe {
      width: 100%;
      height: 160px;
      border: 0;
      border-radius: 8px;
    }
    .switches {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }
    .switch-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fcfcfc;
    }
    .pool-add {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fafafa;
    }
    .pool-add input, .pool-add textarea,
    .pool-item input, .pool-item textarea,
    #actorInput {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      font-family: inherit;
      margin-top: 6px;
    }
    .pool-list {
      max-height: 430px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-top: 10px;
      background: #fff;
    }
    .pool-item {
      padding: 10px;
      border-bottom: 1px dashed var(--line);
    }
    .pool-item:last-child { border-bottom: 0; }
    .pool-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .feed {
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }
    .feed-item {
      padding: 10px;
      border-bottom: 1px dashed var(--line);
      font-size: 14px;
    }
    .feed-item:last-child { border-bottom: 0; }
    .danger-box {
      border: 1px solid #fecaca;
      border-radius: 10px;
      background: #fff1f2;
      padding: 10px;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      margin-right: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h2>签到 + 盲盒后台 v5.0</h2>
      <div class="small">后台已启用管理口令校验。页面每 5 秒自动刷新。</div>
      <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <button id="exportBtn">导出 CSV</button>
        <button id="manualRefreshBtn" class="btn-muted">手动刷新</button>
        <input id="actorInput" type="text" maxlength="30" placeholder="操作人（例如 班长 / 老师）" style="max-width:280px;margin-top:0;" />
      </div>
      <div class="small" id="authTip" style="margin-top:8px;"></div>

      <div class="stats" style="margin-top:10px;">
        <div class="stat">应到<b id="total">0</b></div>
        <div class="stat">已到<b id="checked">0</b></div>
        <div class="stat">未到<b id="absent">0</b></div>
        <div class="stat">总抽取<b id="totalDraw">0</b></div>
        <div class="stat">总完成<b id="totalComplete">0</b></div>
        <div class="stat">总完成率<b id="overallRate">0%</b></div>
      </div>
    </section>

    <section class="grid-2">
      <article class="card">
        <h3>场次开关</h3>
        <div class="switches">
          <label class="switch-item"><input type="checkbox" id="sRequireCheckin" /> 只允许先签到再抽卡</label>
          <label class="switch-item"><input type="checkbox" id="sShowWall" /> 显示全员实时盲盒墙</label>
          <label class="switch-item"><input type="checkbox" id="sAnonymous" /> 实时墙和排行榜匿名显示</label>
          <label class="switch-item"><input type="checkbox" id="sObfuscate" /> 学生端位置模糊显示（保留 3 位小数）</label>
        </div>
        <button id="saveSettingsBtn" style="margin-top:10px;">保存开关</button>
        <div class="small" id="settingsMsg" style="margin-top:8px;"></div>
      </article>

      <article class="card">
        <h3>完成榜（按完成数）</h3>
        <table>
          <thead>
            <tr><th>#</th><th>同学</th><th>完成</th><th>抽取</th><th>完成率</th></tr>
          </thead>
          <tbody id="rankBody"></tbody>
        </table>
      </article>
    </section>

    <section class="card">
      <h3 style="margin-bottom:8px;">班级徽章</h3>
      <div id="badgeWrap" class="small"></div>
    </section>

    <section class="card">
      <div class="small">签到地图（可缩放，点击标记看姓名/时间/自拍）</div>
      <div class="map-wrap">
        <div id="map" class="map-canvas"></div>
      </div>
      <div id="mapTip" class="small" style="margin-top:8px;">地图加载中...</div>
      <div id="fallbackMaps" class="fallback-grid"></div>
    </section>

    <section class="grid-2">
      <article class="card">
        <h3>自定义梗池</h3>
        <div class="pool-add">
          <div class="small">新增梗</div>
          <input id="newTitle" type="text" maxlength="40" placeholder="标题（最多 40 字）" />
          <textarea id="newDetail" rows="3" maxlength="180" placeholder="内容（最多 180 字）"></textarea>
          <label class="small" style="display:block;margin-top:8px;"><input id="newEnabled" type="checkbox" checked /> 立即启用</label>
          <button id="addPoolBtn" style="margin-top:8px;">新增到梗池</button>
        </div>
        <div id="poolList" class="pool-list"></div>
      </article>

      <article class="card">
        <h3>操作审计日志</h3>
        <div id="auditFeed" class="feed"></div>
      </article>
    </section>

    <section class="card">
      <div class="danger-box">
        <h3 style="margin-bottom:8px;">隐私清理</h3>
        <div class="small">课后可一键清空全部定位和自拍（不可恢复）。</div>
        <button id="clearPrivacyBtn" class="btn-danger" style="margin-top:8px;">一键清空定位和自拍</button>
      </div>
    </section>

    <section class="grid-2">
      <article class="card">
        <h3>全班签到明细</h3>
        <table>
          <thead>
            <tr><th>姓名</th><th>状态</th><th>签到时间</th><th>位置</th><th>自拍</th><th>抽取</th><th>完成</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </article>

      <article class="card">
        <h3>盲盒日志（最新 120 条）</h3>
        <div id="drawFeed" class="feed"></div>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const sessionId = location.pathname.split('/').pop();
    const adminKey = new URLSearchParams(location.search).get('k') || '';

    const totalEl = document.getElementById('total');
    const checkedEl = document.getElementById('checked');
    const absentEl = document.getElementById('absent');
    const totalDrawEl = document.getElementById('totalDraw');
    const totalCompleteEl = document.getElementById('totalComplete');
    const overallRateEl = document.getElementById('overallRate');
    const tbody = document.getElementById('tbody');
    const exportBtn = document.getElementById('exportBtn');
    const manualRefreshBtn = document.getElementById('manualRefreshBtn');
    const mapTip = document.getElementById('mapTip');
    const fallbackMaps = document.getElementById('fallbackMaps');
    const rankBody = document.getElementById('rankBody');
    const drawFeed = document.getElementById('drawFeed');
    const poolList = document.getElementById('poolList');
    const newTitle = document.getElementById('newTitle');
    const newDetail = document.getElementById('newDetail');
    const newEnabled = document.getElementById('newEnabled');
    const addPoolBtn = document.getElementById('addPoolBtn');
    const sRequireCheckin = document.getElementById('sRequireCheckin');
    const sShowWall = document.getElementById('sShowWall');
    const sAnonymous = document.getElementById('sAnonymous');
    const sObfuscate = document.getElementById('sObfuscate');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const settingsMsg = document.getElementById('settingsMsg');
    const clearPrivacyBtn = document.getElementById('clearPrivacyBtn');
    const auditFeed = document.getElementById('auditFeed');
    const actorInput = document.getElementById('actorInput');
    const authTip = document.getElementById('authTip');
    const badgeWrap = document.getElementById('badgeWrap');

    let latest = null;
    let map = null;
    let markerLayer = null;

    const actorStorageKey = `admin_actor_${sessionId}`;
    actorInput.value = localStorage.getItem(actorStorageKey) || 'teacher';
    actorInput.addEventListener('input', () => {
      localStorage.setItem(actorStorageKey, actorInput.value.trim() || 'teacher');
    });

    if (adminKey) {
      authTip.textContent = '管理口令已加载，可以进行后台操作。';
    } else {
      authTip.textContent = '未检测到管理口令，后台接口将拒绝操作。请使用完整后台链接（带 ?k=...）。';
      authTip.className = 'small danger';
    }

    function fmt(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleString('zh-CN', { hour12: false });
    }

    function fmtLocation(loc) {
      if (!loc || !Number.isFinite(loc.lat) || !Number.isFinite(loc.lng)) return '-';
      const lat = Number(loc.lat).toFixed(6);
      const lng = Number(loc.lng).toFixed(6);
      const map = `https://www.google.com/maps?q=${lat},${lng}`;
      return `<a class="link" target="_blank" rel="noreferrer" href="${map}">${lat}, ${lng}</a>`;
    }

    function photoCell(photoDataUrl) {
      if (!photoDataUrl) return '<span class="small">-</span>';
      const safe = escapeHtml(photoDataUrl);
      return `<a href="${safe}" target="_blank" rel="noreferrer"><img class="thumb" src="${safe}" alt="签到自拍" /></a>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'X-Admin-Key': adminKey,
        'X-Admin-Actor': actorInput.value.trim() || 'teacher'
      };
    }

    async function fetchData() {
      const res = await fetch(`/api/sessions/${sessionId}/admin`, {
        headers: { 'X-Admin-Key': adminKey }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '读取失败');
      return data;
    }

    async function postJson(url, payload) {
      const body = {
        ...(payload || {}),
        adminKey,
        actor: actorInput.value.trim() || 'teacher'
      };
      const res = await fetch(url, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    function renderFallbackMaps(checked) {
      if (!checked.length) {
        fallbackMaps.innerHTML = '';
        return;
      }
      fallbackMaps.innerHTML = checked.map(s => {
        const lat = Number(s.checkinLocation.lat).toFixed(6);
        const lng = Number(s.checkinLocation.lng).toFixed(6);
        const src = `https://www.google.com/maps?q=${lat},${lng}&z=17&output=embed`;
        return `
          <div class="fallback-item">
            <div class="small" style="margin-bottom:6px;"><b>${escapeHtml(s.name)}</b></div>
            <iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="${src}"></iframe>
          </div>
        `;
      }).join('');
    }

    function ensureMap() {
      if (!window.L) {
        mapTip.textContent = '地图脚本加载失败（CDN 访问受限），请刷新或切换网络后重试。';
        return;
      }
      if (!window.L || map) return;
      map = L.map('map');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
      markerLayer = L.layerGroup().addTo(map);
      map.setView([35.8617, 104.1954], 4);
    }

    function updateMap(data) {
      const checked = data.students.filter(s => s.checkedIn && s.checkinLocation && Number.isFinite(s.checkinLocation.lat) && Number.isFinite(s.checkinLocation.lng));
      renderFallbackMaps(checked);

      ensureMap();
      if (!map || !markerLayer) return;

      markerLayer.clearLayers();

      if (!checked.length) {
        mapTip.textContent = '暂无已签到定位点';
        return;
      }

      const bounds = [];
      checked.forEach(s => {
        const lat = Number(s.checkinLocation.lat);
        const lng = Number(s.checkinLocation.lng);
        bounds.push([lat, lng]);
        const popup = `
          <div style="min-width:170px;">
            <div><b>${escapeHtml(s.name)}</b></div>
            <div style="font-size:12px;color:#475569;margin-top:4px;">${escapeHtml(fmt(s.checkedInAt))}</div>
            ${s.checkinPhoto ? `<img src="${escapeHtml(s.checkinPhoto)}" style="width:100%;margin-top:6px;border-radius:8px;border:1px solid #e2e8f0;" alt="自拍" />` : ''}
          </div>
        `;
        L.marker([lat, lng]).addTo(markerLayer).bindPopup(popup);
      });

      mapTip.textContent = `已显示 ${checked.length} 个签到位置`;
      if (bounds.length === 1) {
        map.setView(bounds[0], 17);
      } else {
        map.fitBounds(bounds, { padding: [24, 24] });
      }
    }

    function renderLeaderboard(rows) {
      if (!Array.isArray(rows) || !rows.length) {
        rankBody.innerHTML = '<tr><td colspan="5" class="small">暂无数据</td></tr>';
        return;
      }
      rankBody.innerHTML = rows.map((row, idx) => `
        <tr>
          <td>${idx + 1}</td>
          <td>${escapeHtml(row.name)}</td>
          <td>${row.completeCount}</td>
          <td>${row.drawCount}</td>
          <td>${row.completionRate}%</td>
        </tr>
      `).join('');
    }

    function renderFeed(logs) {
      if (!Array.isArray(logs) || !logs.length) {
        drawFeed.innerHTML = '<div class="feed-item small">暂无盲盒日志</div>';
        return;
      }
      drawFeed.innerHTML = logs.slice(0, 120).map(log => `
        <div class="feed-item">
          <div><b>${escapeHtml(log.name)}</b> · ${escapeHtml(log.title)} ${log.completed ? '<span class="ok">已完成</span>' : '<span class="pending">待完成</span>'}</div>
          <div>${escapeHtml(log.detail)}</div>
          <div class="small">抽取：${escapeHtml(fmt(log.createdAt))}${log.completedAt ? ` · 完成：${escapeHtml(fmt(log.completedAt))}` : ''}</div>
        </div>
      `).join('');
    }

    function renderAudit(logs) {
      if (!Array.isArray(logs) || !logs.length) {
        auditFeed.innerHTML = '<div class="feed-item small">暂无审计日志</div>';
        return;
      }
      auditFeed.innerHTML = logs.slice(0, 120).map(log => `
        <div class="feed-item">
          <div><b>${escapeHtml(log.action)}</b> · ${escapeHtml(log.actor)}</div>
          <div>${escapeHtml(log.detail || '-')}</div>
          <div class="small">${escapeHtml(fmt(log.createdAt))} · ${escapeHtml(log.ip || '-')}</div>
        </div>
      `).join('');
    }

    function renderBadges(badges) {
      if (!Array.isArray(badges) || !badges.length) {
        badgeWrap.innerHTML = '<span class="small">暂无徽章</span>';
        return;
      }
      badgeWrap.innerHTML = badges.map(b => `<span class="badge">${escapeHtml(b.label)}</span>`).join('');
    }

    function renderPool(pool) {
      if (document.activeElement && document.activeElement.closest('.pool-item')) {
        return;
      }
      if (!Array.isArray(pool) || !pool.length) {
        poolList.innerHTML = '<div class="pool-item small">暂无梗条目</div>';
        return;
      }

      poolList.innerHTML = pool.map(item => `
        <div class="pool-item" data-id="${escapeHtml(item.id)}">
          <div class="small">ID: ${escapeHtml(item.id)}</div>
          <input class="pool-title" type="text" maxlength="40" value="${escapeHtml(item.title)}" />
          <textarea class="pool-detail" rows="2" maxlength="180">${escapeHtml(item.detail)}</textarea>
          <label class="small" style="display:block;margin-top:6px;"><input class="pool-enabled" type="checkbox" ${item.enabled ? 'checked' : ''} /> 可抽取</label>
          <div class="pool-actions">
            <button class="pool-save">保存</button>
            <button class="pool-delete btn-danger">删除</button>
          </div>
        </div>
      `).join('');
    }

    function render(data) {
      latest = data;
      totalEl.textContent = String(data.total);
      checkedEl.textContent = String(data.checked);
      absentEl.textContent = String(data.total - data.checked);
      totalDrawEl.textContent = String(data.stats?.totalDraw ?? 0);
      totalCompleteEl.textContent = String(data.stats?.totalComplete ?? 0);
      overallRateEl.textContent = `${data.stats?.overallCompletionRate ?? 0}%`;

      tbody.innerHTML = data.students.map(s => `
        <tr>
          <td>${escapeHtml(s.name)}</td>
          <td class="${s.checkedIn ? 'ok' : 'pending'}">${s.checkedIn ? '已签到' : '未签到'}</td>
          <td>${fmt(s.checkedInAt)}</td>
          <td>${fmtLocation(s.checkinLocation)}</td>
          <td>${photoCell(s.checkinPhoto)}</td>
          <td>${s.drawCount || 0}</td>
          <td>${s.completeCount || 0}</td>
        </tr>
      `).join('');

      sRequireCheckin.checked = !!data.settings.requireCheckinBeforeDraw;
      sShowWall.checked = !!data.settings.showRealtimeWall;
      sAnonymous.checked = !!data.settings.anonymousWall;
      sObfuscate.checked = !!data.settings.obfuscateLocation;

      renderLeaderboard(data.leaderboard || []);
      renderFeed(data.drawLogs || []);
      renderPool(data.blindboxPool || []);
      renderAudit(data.auditLogs || []);
      renderBadges(data.classBadges || []);
      updateMap(data);
    }

    async function tick() {
      try {
        const data = await fetchData();
        render(data);
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="danger">${escapeHtml(err.message)}</td></tr>`;
      }
    }

    function csvLocation(loc) {
      if (!loc || !Number.isFinite(loc.lat) || !Number.isFinite(loc.lng)) return '';
      return `${Number(loc.lat).toFixed(6)},${Number(loc.lng).toFixed(6)}`;
    }

    function exportCSV() {
      if (!latest) return;
      const rows = [['姓名', '状态', '签到时间', '签到位置(纬度,经度)', '是否有自拍', '抽取次数', '完成次数']];
      latest.students.forEach(s => {
        rows.push([
          s.name,
          s.checkedIn ? '已签到' : '未签到',
          fmt(s.checkedInAt),
          csvLocation(s.checkinLocation),
          s.checkinPhoto ? '是' : '否',
          s.drawCount || 0,
          s.completeCount || 0
        ]);
      });
      const csv = rows
        .map(cols => cols.map(v => `"${String(v ?? '').replaceAll('"', '""')}"`).join(','))
        .join('\n');
      const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `签到盲盒后台_${sessionId}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    saveSettingsBtn.addEventListener('click', async () => {
      saveSettingsBtn.disabled = true;
      saveSettingsBtn.textContent = '保存中...';
      settingsMsg.textContent = '';
      try {
        await postJson(`/api/sessions/${sessionId}/settings`, {
          requireCheckinBeforeDraw: sRequireCheckin.checked,
          showRealtimeWall: sShowWall.checked,
          anonymousWall: sAnonymous.checked,
          obfuscateLocation: sObfuscate.checked
        });
        settingsMsg.textContent = '开关保存成功';
        await tick();
      } catch (err) {
        settingsMsg.textContent = err.message || '保存失败';
      } finally {
        saveSettingsBtn.disabled = false;
        saveSettingsBtn.textContent = '保存开关';
      }
    });

    clearPrivacyBtn.addEventListener('click', async () => {
      if (!confirm('确定清空全部定位和自拍吗？此操作不可恢复。')) return;
      clearPrivacyBtn.disabled = true;
      clearPrivacyBtn.textContent = '清空中...';
      try {
        await postJson(`/api/sessions/${sessionId}/privacy/clear`, {});
        await tick();
        alert('已清空全部定位和自拍数据');
      } catch (err) {
        alert(err.message || '清空失败');
      } finally {
        clearPrivacyBtn.disabled = false;
        clearPrivacyBtn.textContent = '一键清空定位和自拍';
      }
    });

    addPoolBtn.addEventListener('click', async () => {
      const title = newTitle.value.trim();
      const detail = newDetail.value.trim();
      if (!title || !detail) {
        alert('标题和内容都要填写');
        return;
      }
      addPoolBtn.disabled = true;
      addPoolBtn.textContent = '新增中...';
      try {
        await postJson(`/api/sessions/${sessionId}/pool/add`, {
          title,
          detail,
          enabled: newEnabled.checked
        });
        newTitle.value = '';
        newDetail.value = '';
        newEnabled.checked = true;
        await tick();
      } catch (err) {
        alert(err.message || '新增失败');
      } finally {
        addPoolBtn.disabled = false;
        addPoolBtn.textContent = '新增到梗池';
      }
    });

    poolList.addEventListener('click', async e => {
      const item = e.target.closest('.pool-item');
      if (!item) return;
      const id = item.dataset.id;

      if (e.target.classList.contains('pool-save')) {
        const title = item.querySelector('.pool-title').value.trim();
        const detail = item.querySelector('.pool-detail').value.trim();
        const enabled = item.querySelector('.pool-enabled').checked;
        e.target.disabled = true;
        e.target.textContent = '保存中...';
        try {
          await postJson(`/api/sessions/${sessionId}/pool/update`, { id, title, detail, enabled });
          await tick();
        } catch (err) {
          alert(err.message || '保存失败');
        } finally {
          e.target.disabled = false;
          e.target.textContent = '保存';
        }
      }

      if (e.target.classList.contains('pool-delete')) {
        if (!confirm('确定删除这条梗吗？')) return;
        e.target.disabled = true;
        e.target.textContent = '删除中...';
        try {
          await postJson(`/api/sessions/${sessionId}/pool/delete`, { id });
          await tick();
        } catch (err) {
          alert(err.message || '删除失败');
        } finally {
          e.target.disabled = false;
          e.target.textContent = '删除';
        }
      }
    });

    exportBtn.addEventListener('click', exportCSV);
    manualRefreshBtn.addEventListener('click', tick);

    tick();
    setInterval(tick, 5000);
  </script>
</body>
</html>
